global:
  clusterName: kbm
  kubernetes:
    version: v1.32.0
  kubeaid:
    repo: git@github.com:Archisman-Mridha/kubeaid.git
  kubeaidConfig:
    repo: git@github.com:Archisman-Mridha/kubeaid-config.git
  additionalUsers: 
    - name: archi
      sshPublicKey: ssh-rsa  cardno:13_819_971
provider:
  hetzner: true

hetzner:
  mode: bare-metal
  bareMetal:
    wipeDisks: true
    sshKeyPair:
      name: cluster
    installImage:
      imagePath: /root/.oldroot/nfs/images/Ubuntu-2404-noble-amd64-base.tar.gz
      vg0:
        size: 80G
        rootVolumeSize: 50G

  controlPlane:
    regions: 
      - fsn1
      - nbg1
      - hel1

    
    
    bareMetal:
      endpoint: 
        isFailoverIP: true
        host: 95.216.30.44
      bareMetalHosts: 
        - serverID: "1455726"
        - serverID: "1455733"
        - serverID: "1455734"
      diskLayoutSetupCommands: |
        set -e

        apt-get update -y
        apt install zfsutils-linux -y

        # Create necessary partitions.

        printf "d\n4\nw\n" | fdisk /dev/nvme0n1
        echo ",,E" | sfdisk -N 4 /dev/nvme0n1 --force --no-reread
        echo ",462G,L" | sfdisk -N 5 /dev/nvme0n1 --force --no-reread

        echo ",,L" | sfdisk -N 6 /dev/nvme0n1 --force --no-reread

        partprobe /dev/nvme0n1
        udevadm settle

        printf "d\n4\nw\n" | fdisk /dev/nvme1n1
        echo ",,E" | sfdisk -N 4 /dev/nvme1n1 --force --no-reread
        echo ",462G,L" | sfdisk -N 5 /dev/nvme1n1 --force --no-reread

        echo ",,L" | sfdisk -N 6 /dev/nvme1n1 --force --no-reread

        partprobe /dev/nvme1n1
        udevadm settle

        if zpool import -f primary >/dev/null 2>&1; then
          echo "Imported existing primary ZFS pool"
        else
          # Create the ZFS pool with RAIDZ-1 enabled.
          zpool create primary raidz1 \
                /dev/nvme0n1p5  \ 
                /dev/nvme1n1p5 

          # Create the filesystem for ContainerD, to store container images.
          zfs create pool/containerd
          zfs set mountpoint=/var/lib/containerd pool/containerd

          # Create the filesystem where pod logs will be stored.
          zfs create pool/pod-logs
          zfs set mountpoint=/var/log/pods pool/pod-logs

          # Create the filesystem where pod ephemeral volumes will be stored.
          zfs create pool/pod-ephemeral-volumes
          zfs set mountpoint=/var/lib/kubelet/pods pool/pod-ephemeral-volumes

          # Enable weekly ZPool trimming for the ZPool.
          # So unused storage space will be reclaimed back, into the ZFS pool.
          # REFER : https://openzfs.github.io/openzfs-docs/man/master/8/zpool-trim.8.html.
          systemctl enable zfs-trim-weekly@rpool.timer --now
        fi

    

  nodeGroups:
    hcloud: 
      []

    bareMetal:
      - name: general
        bareMetalHosts: 
          - serverID: "1414813"
          - serverID: "1454837"
          - serverID: "1454838"
        diskLayoutSetupCommands: |
          set -e

          apt-get update -y
          apt install zfsutils-linux -y

          # Create necessary partitions.

          printf "d\n4\nw\n" | fdisk /dev/sda
          echo ",,E" | sfdisk -N 4 /dev/sda --force --no-reread
          echo ",1K,L" | sfdisk -N 5 /dev/sda --force --no-reread

          echo ",,L" | sfdisk -N 6 /dev/sda --force --no-reread

          partprobe /dev/sda
          udevadm settle

          printf "d\n4\nw\n" | fdisk /dev/sdb
          echo ",,E" | sfdisk -N 4 /dev/sdb --force --no-reread
          echo ",1K,L" | sfdisk -N 5 /dev/sdb --force --no-reread

          echo ",,L" | sfdisk -N 6 /dev/sdb --force --no-reread

          partprobe /dev/sdb
          udevadm settle

          if zpool import -f primary >/dev/null 2>&1; then
            echo "Imported existing primary ZFS pool"
          else
            # Create the ZFS pool with RAIDZ-1 enabled.
            zpool create primary raidz1 \
                  /dev/sda5  \ 
                  /dev/sdb5 

            # Create the filesystem for ContainerD, to store container images.
            zfs create pool/containerd
            zfs set mountpoint=/var/lib/containerd pool/containerd

            # Create the filesystem where pod logs will be stored.
            zfs create pool/pod-logs
            zfs set mountpoint=/var/log/pods pool/pod-logs

            # Create the filesystem where pod ephemeral volumes will be stored.
            zfs create pool/pod-ephemeral-volumes
            zfs set mountpoint=/var/lib/kubelet/pods pool/pod-ephemeral-volumes

            # Enable weekly ZPool trimming for the ZPool.
            # So unused storage space will be reclaimed back, into the ZFS pool.
            # REFER : https://openzfs.github.io/openzfs-docs/man/master/8/zpool-trim.8.html.
            systemctl enable zfs-trim-weekly@rpool.timer --now
          fi
        labels: 
          node-role.kubernetes.io/general: ""
          node.cluster.x-k8s.io/nodegroup: general
        taints: 
          []

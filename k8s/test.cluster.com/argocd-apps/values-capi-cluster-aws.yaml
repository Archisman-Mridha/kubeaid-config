global:
  clusterName: test.cluster.com
  customerid: kubeaid-demo
  kubernetes:
    version: v1.28.3
  clusterAPI:
    version: v1.8.1
  capa:
    version: v2.6.1
    autoScaler: true
  kubeaid:
    repo: https://github.com/Archisman-Mridha/kubeaid.git
  kubeaidConfig:
    repo: https://github.com/Archisman-Mridha/kubeaid-config.git

provider:
  aws: true

aws:
  secretName: capi-cluster-token
  sshKeyName: kubeaid-demo
  region: us-east-2
  bastion:
    enabled: true
  vpc:
    cidrBlock: 10.14.0.0/22
  pods:
    cidrBlock: 10.244.0.0/16
  controlPlane:
    loadBalancerType: nlb
    region: us-east-2
    replicas: 1
    instanceType: t2.medium
    ami:
      id: ami-05145146e3a9db6f3
  machinePools:
    - name: primary
      replicas: 1
      region: us-east-2
      instanceType: t2.medium
      sshKeyName: kubeaid-demo
      ami:
        id: ami-05145146e3a9db6f3
      labels:
        workload-type: applications
        project: kubeaid-demo
    - name: secondary
      replicas: 1
      instanceType: t2.medium
      sshKeyName: kubeaid-demo
      ami:
        id: ami-05145146e3a9db6f3
